name: DawnPilot
options:
  bundleIdPrefix: com.yessicmd.dawnpilot
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  DawnPilot:
    type: application
    platform: iOS
    sources:
      - path: DawnPilot
    info:
      path: DawnPilot/Info.plist
      properties:
        CFBundleDisplayName: 晨航
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSAlarmKitUsageDescription: 根据天气和你的通勤设置，为工作日安排可靠的起床闹钟。
        BGTaskSchedulerPermittedIdentifiers:
          - com.yessicmd.dawnpilot.refresh
        UIBackgroundModes:
          - fetch
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yessicmd.dawnpilot
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          DEVELOPMENT_TEAM: ""
        Release:
          DEVELOPMENT_TEAM: "66WCCRKRLC"
          PROVISIONING_PROFILE_SPECIFIER: ""
  DawnPilotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DawnPilotTests
    dependencies:
      - target: DawnPilot
